<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Canal</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .channel-header { background: #F0F3F8; border: 1px solid #CCD2E0; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .channel-avatar { width: 80px; height: 80px; background: #CCC; border: 2px solid #999; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #666; }
        .channel-info h2 { margin: 0 0 5px 0; color: #333; }
        .owner-badge { background: #FFE0B2; color: #E65100; border: 1px solid #FFB74D; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 3px; display: inline-block; margin-top: 5px; }
        .main-content-layout { display: flex; gap: 20px; max-width: 1000px; margin: 15px auto; padding: 0 10px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .btn-delete { background: #CC0000; color: white; border: none; width: 100%; cursor: pointer; padding: 5px; margin-top: 5px; font-size: 11px; }
        
        /* Estilos para Ediçăo */
        .edit-icon { cursor: pointer; color: #555; font-size: 14px; margin-left: 5px; }
        .edit-icon:hover { color: #000; }
        .edit-box { display: none; margin-top: 5px; background: #eee; padding: 5px; }
        @media (max-width: 768px) { .main-content-layout { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="lirpe">Lirpe</span><span class="hub">Hub</span>
            </a>
            <span class="slogan">Broadcast Yourself</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Página Inicial</a> | 
            <a href="canais.html" class="active">Canais</a> |
            <a href="enviar.html" style="color: #CC0000; font-weight: bold;">Enviar Vídeo</a>
            <span id="linkModeracao" style="display:none;"> | <a href="moderacao.html" style="color: purple;">Moderaçăo</a></span>
        </nav>
    </header>

    <div class="container" style="max-width: 1000px; margin: 15px auto; padding: 0 10px;">
        <div class="channel-header">
            <div class="channel-avatar" id="canalAvatar">?</div>
            <div class="channel-info">
                <h2 id="canalNome">Carregando...</h2>
                <button id="btnInscricao" onclick="toggleInscricao()" style="display:none;">Carregando...</button>
                
                <div id="statusDono" style="display: none; margin-top:10px;">
                    <span class="owner-badge">Seu Espaço (Dono)</span>
                </div>
            </div>
        </div>

        <div style="background: #FFF; border: 1px solid #CCC; padding: 10px; margin-bottom: 20px;">
            <p id="canalDescricao" style="font-style: italic;">Carregando...</p>
            <span id="btnEditarDesc" class="edit-icon" style="display:none;" onclick="toggleEdit('descEditBox')"> Editar descriçăo</span>
            <div id="descEditBox" class="edit-box">
                <input type="text" id="inputNovaDesc" placeholder="Nova descriçăo...">
                <button onclick="salvarDescricao()">Salvar</button>
            </div>
        </div>

        <div class="main-content-layout">
            <div class="video-column">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="secaoTitulo">Vídeos do Canal</h3>
                    <select id="ordemSelect" onchange="carregarCanal()">
                        <option value="desc">Mais recentes</option>
                        <option value="asc">Mais antigos</option>
                    </select>
                </div>
                <main class="video-grid" id="canalVideosContainer"></main>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    
    <script>
        let supabaseClient = null;

        window.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            await carregarCanal();
        });

        function toggleEdit(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        async function carregarCanal() {
            const urlParams = new URLSearchParams(window.location.search);
            let canalAlvo = urlParams.get('user');
            if (!canalAlvo) return;

            const ordem = document.getElementById('ordemSelect').value;
            const { data: { session } } = await supabaseClient.auth.getSession();
            const ehDono = session && session.user.user_metadata?.display_name === canalAlvo;

            document.getElementById('canalNome').innerText = canalAlvo;
            document.getElementById('canalAvatar').innerText = canalAlvo.charAt(0).toUpperCase();

            const { data: videos } = await supabaseClient
                .from('videos')
                .select('*')
                .eq('autor', canalAlvo)
                .order('created_at', { ascending: (ordem === 'asc') });

            const container = document.getElementById('canalVideosContainer');
            if (videos) {
                container.innerHTML = videos.map(v => `
                    <div style="border:1px solid #ccc; padding:5px;">
                        <a href="watch.html?v=${v.id}"><img src="${v.thumb}" style="width:100%"></a>
                        <div style="margin-top:5px;">
                            ${ehDono ? 
                                `<span>${v.titulo}</span> <span class="edit-icon" onclick="toggleEdit('edit-tit-${v.id}')"></span>
                                 <div id="edit-tit-${v.id}" class="edit-box">
                                    <input type="text" id="tit-${v.id}" value="${v.titulo}">
                                    <button onclick="editarTitulo('${v.id}')">OK</button>
                                 </div>` 
                                : `<h3>${v.titulo}</h3>`}
                        </div>
                        ${ehDono ? `<button class="btn-delete" onclick="deletarVideo('${v.id}')">Deletar</button>` : ''}
                    </div>
                `).join('');
                document.getElementById('canalDescricao').innerText = videos[0]?.descricao || "Bem-vindo ao meu canal!";
            }

            if (ehDono) {
                document.getElementById('statusDono').style.display = 'block';
                document.getElementById('btnEditarDesc').style.display = 'inline';
            } else {
                verificarInscricao(canalAlvo, session?.user.email);
            }
        }

        async function editarTitulo(id) {
            const novoTitulo = document.getElementById('tit-' + id).value;
            await supabaseClient.from('videos').update({ titulo: novoTitulo }).eq('id', id);
            location.reload();
        }

        async function deletarVideo(id) {
            if (!confirm("Tem certeza?")) return;
            await supabaseClient.from('videos').delete().eq('id', id);
            location.reload();
        }

        async function salvarDescricao() {
            const novaDesc = document.getElementById('inputNovaDesc').value;
            const canalAlvo = new URLSearchParams(window.location.search).get('user');
            await supabaseClient.from('videos').update({ descricao: novaDesc }).eq('autor', canalAlvo);
            location.reload();
        }

        async function verificarInscricao(canalAlvo, email) {
            if (!email) return;
            const btn = document.getElementById('btnInscricao');
            btn.style.display = 'inline-block';
            const { data } = await supabaseClient.from('inscricoes').select('*').eq('seguidor_email', email).eq('canal_seguido', canalAlvo);
            btn.innerText = data.length > 0 ? " Inscrito" : "+ Inscrever-se";
            btn.dataset.inscrito = data.length > 0 ? "true" : "false";
        }

        async function toggleInscricao() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return alert("Faça login!");
            const canalAlvo = new URLSearchParams(window.location.search).get('user');
            const jaInscrito = document.getElementById('btnInscricao').dataset.inscrito === "true";
            
            if (jaInscrito) await supabaseClient.from('inscricoes').delete().eq('seguidor_email', session.user.email).eq('canal_seguido', canalAlvo);
            else await supabaseClient.from('inscricoes').insert([{ seguidor_email: session.user.email, canal_seguido: canalAlvo }]);
            location.reload();
        }
    </script>
</body>
</html>
