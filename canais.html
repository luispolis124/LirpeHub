<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Canal</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .channel-header { background: #F0F3F8; border: 1px solid #CCD2E0; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .channel-avatar { width: 80px; height: 80px; background: #CCC; border: 2px solid #999; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #666; }
        .channel-info h2 { margin: 0 0 5px 0; color: #333; }
        .channel-info p { margin: 0; font-size: 12px; color: #666; }
        .owner-badge { background: #FFE0B2; color: #E65100; border: 1px solid #FFB74D; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 3px; display: inline-block; margin-top: 5px; }
        .main-content-layout { display: flex; gap: 20px; max-width: 1000px; margin: 15px auto; padding: 0 10px; box-sizing: border-box; }
        .video-column { flex: 3; min-width: 0; }
        .sidebar-column { flex: 1; min-width: 200px; font-size: 12px; font-family: Arial, sans-serif; }
        @media (max-width: 768px) { .main-content-layout { flex-direction: column; } .sidebar-column { width: 100%; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="lirpe">Lirpe</span><span class="hub">Hub</span>
            </a>
            <span class="slogan">Broadcast Yourself</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">P·gina Inicial</a> | 
            <a href="#">VÌdeos</a> | 
            <a href="canais.html" class="active">Canais</a> |
            <a href="enviar.html" style="color: #CC0000; font-weight: bold;">Enviar VÌdeo</a>
        </nav>
    </header>

    <div class="container" style="max-width: 1000px; margin: 15px auto; padding: 0 10px; box-sizing: border-box;">
        
        <div class="channel-header">
            <div class="channel-avatar" id="canalAvatar">?</div>
            <div class="channel-info">
                <h2 id="canalNome">Carregando Canal...</h2>
                <p id="canalSub">Carregando estatÌsticas...</p>
                
                <button id="btnInscricao" onclick="toggleInscricao()" style="margin-top: 10px; cursor: pointer; display: none;">
                    Carregando...
                </button>
                
                <div id="statusDono" style="display: none;">
                    <span class="owner-badge">Seu EspaÁo (Dono)</span>
                </div>
            </div>
        </div>

        <div style="background: #FFF; border: 1px solid #CCC; padding: 10px; margin-bottom: 20px; font-size: 12px; color: #333;">
            <h4 style="margin: 0 0 5px 0; color: #555; border-bottom: 1px solid #EEE; padding-bottom: 2px;">Sobre o canal:</h4>
            <p id="canalDescricao" style="margin: 5px 0 0 0; line-height: 1.4; font-style: italic;">Carregando descriÁ„o...</p>
        </div>

        <div class="main-content-layout" style="margin: 0; padding: 0;">
            <div class="video-column">
                <h3 style="background: #EAEAEA; border: 1px solid #CCCCCC; padding: 5px; margin: 0 0 15px 0; font-size: 13px; color: #333;" id="secaoTitulo">
                     VÌdeos de ...
                </h3>
                <main class="video-grid" id="canalVideosContainer" style="margin-top: 0;"></main>
            </div>

            <aside class="sidebar-column">
                <div style="border: 1px solid #CCD2E0; background: #F0F3F8; padding: 10px; margin-bottom: 15px;">
                    <h4 style="margin: 0 0 8px 0; color: #0033CC; border-bottom: 1px solid #CCD2E0; padding-bottom: 3px; font-size: 12px;">
                         Detalhes do Canal
                    </h4>
                    <ul style="list-style: none; padding: 0; margin: 0; line-height: 1.8;">
                        <li><strong>InscriÁ„o:</strong> <span id="membroDesde">Recente</span></li>
                        <li><strong>VÌdeos Enviados:</strong> <span id="totalVideos">0</span></li>
                    </ul>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/config.js" defer></script>
    
    <script>
        let supabaseClient = null;

        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof CONFIG !== 'undefined') {
                supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                await carregarCanal();
            }
        });

        async function carregarCanal() {
            const urlParams = new URLSearchParams(window.location.search);
            let canalAlvo = urlParams.get('user');
            let userEmail = "";

            if (!canalAlvo) return;

            // --- IMPLEMENTA«√O DA CONTAGEM DE INSCRITOS ---
            const { count } = await supabaseClient
                .from('inscricoes')
                .select('*', { count: 'exact', head: true })
                .eq('canal_seguido', canalAlvo);
            
            document.getElementById('canalSub').innerText = `${count || 0} inscritos`;
            // ----------------------------------------------

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    userEmail = session.user.email;
                    if (canalAlvo.toLowerCase() === (session.user.user_metadata?.display_name || '').toLowerCase()) {
                        document.getElementById('statusDono').style.display = 'block';
                    } else {
                        verificarInscricao(canalAlvo, userEmail);
                    }
                }
            } catch (err) { console.warn(err); }

            document.getElementById('canalNome').innerText = canalAlvo;
            document.getElementById('canalAvatar').innerText = canalAlvo.charAt(0).toUpperCase();

            try {
                const { data: videos } = await supabaseClient.from('videos').select('*').eq('autor', canalAlvo);
                if (videos && videos.length > 0) {
                    document.getElementById('canalDescricao').innerText = videos[0].descricao || "Bem-vindo ao meu canal!";
                    document.getElementById('totalVideos').innerText = videos.length;
                }
            } catch (e) { console.error(e); }
        }

        async function verificarInscricao(canalAlvo, emailSeguidor) {
            if (!emailSeguidor) return;
            const btn = document.getElementById('btnInscricao');
            btn.style.display = 'inline-block';
            
            const { data } = await supabaseClient.from('inscricoes').select('*').eq('seguidor_email', emailSeguidor).eq('canal_seguido', canalAlvo);
            
            if (data && data.length > 0) {
                btn.innerText = " Inscrito";
                btn.dataset.inscrito = "true";
            } else {
                btn.innerText = "+ Inscrever-se";
                btn.dataset.inscrito = "false";
            }
        }

        async function toggleInscricao() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { alert("FaÁa login para se inscrever!"); return; }

            const canalAlvo = new URLSearchParams(window.location.search).get('user');
            const email = session.user.email;
            const btn = document.getElementById('btnInscricao');
            const jaInscrito = btn.dataset.inscrito === "true";

            if (jaInscrito) {
                await supabaseClient.from('inscricoes').delete().eq('seguidor_email', email).eq('canal_seguido', canalAlvo);
                btn.innerText = "+ Inscrever-se";
                btn.dataset.inscrito = "false";
            } else {
                await supabaseClient.from('inscricoes').insert([{ seguidor_email: email, canal_seguido: canalAlvo }]);
                btn.innerText = " Inscrito";
                btn.dataset.inscrito = "true";
            }
            // Atualiza contagem apÛs clique
            carregarCanal(); 
        }
    </script>
</body>
</html>
