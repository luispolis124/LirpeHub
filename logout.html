<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saindo do LirpeHub...</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #F0F3F8; 
            margin: 0;
        }
        .message { 
            border: 1px solid #CCCCCC; 
            padding: 20px; 
            background: #FFF; 
            text-align: center; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #CC0000; margin-bottom: 10px; }
        p { color: #555; }
    </style>
</head>
<body>

    <div class="message">
        <h2>Saindo do LirpeHub...</h2>
        <p>Aguarde um momento enquanto encerramos sua sessão.</p>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof CONFIG !== 'undefined') {
                try {
                    const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                    
                    // Realiza o logout
                    const { error } = await supabaseClient.auth.signOut();
                    
                    if (error) {
                        console.error("Erro ao sair:", error);
                        alert("Não foi possível encerrar a sessão corretamente.");
                    }
                } catch (err) {
                    console.error("Erro inesperado:", err);
                } finally {
                    // Redireciona para a home após o logout
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1200);
                }
            } else {
                alert("Erro: Configuração não encontrada.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
