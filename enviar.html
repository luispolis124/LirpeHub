<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Enviar Vídeo</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo"><span class="lirpe">Lirpe</span><span class="hub">Hub</span></a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Página Inicial</a> | 
            <a href="enviar.html" class="active">Enviar Vídeo</a>
        </nav>
    </header>

    <div id="loadingSection" style="text-align: center; margin: 100px auto; max-width: 400px; font-family: Arial, sans-serif;">
        <h3 style="color: #666;">Verificando autenticação...</h3>
    </div>

    <div class="container" id="uploadContainer" style="display: none; max-width: 550px; margin: 30px auto;">
        <div class="video-details-box">
            <h2>Publicar Vídeo no LirpeHub</h2>
            <hr>
            
            <form id="uploadForm">
                <label>Seu Apelido/Canal:</label><br>
                <input type="text" id="autor" value="LirpeFelipovi" required style="width: 100%; margin-bottom: 10px; box-sizing: border-box;"><br>

                <label>Título do Vídeo:</label><br>
                <input type="text" id="titulo" value="Meu primeiro vídeo de sono de trabalho" required style="width: 100%; margin-bottom: 10px; box-sizing: border-box;"><br>

                <label>Descrição do Vídeo:</label><br>
                <textarea id="videoDescricao" style="width: 100%; height: 80px; margin-bottom: 10px; box-sizing: border-box; resize: vertical;">Sejam bem-vindos ao meu canal aqui no Brasil! Venha conhecer tudo o que estou criando. Sou o criador do LirpeHub e autista nível 2 de suporte. Esse é um vídeo sobre o meu sono de trabalho. O que você achou? Deixe sua opinião nos comentários, ela é muito importante para o desenvolvimento da plataforma!</textarea><br>

                <div style="margin-bottom: 15px; background: #EAEAEA; padding: 8px; border: 1px solid #CCCCCC;">
                    <label style="margin-right: 15px; font-size: 12px;">
                        <input type="radio" name="uploadType" value="youtube" checked onclick="toggleUploadType('youtube')"> Link do YouTube
                    </label>
                    <label style="font-size: 12px;">
                        <input type="radio" name="uploadType" value="file" onclick="toggleUploadType('file')"> Arquivo de Vídeo Local
                    </label>
                </div>

                <div id="ytInputSection">
                    <label>Link do Vídeo do YouTube:</label><br>
                    <input type="url" id="ytLink" placeholder="Ex: https://www.youtube.com/watch?v=dQw4w9WgXcQ" style="width: 100%; margin-bottom: 15px; box-sizing: border-box;"><br>
                </div>

                <div id="fileInputSection" style="display: none;">
                    <label>Selecione o Vídeo (.mp4, .webm):</label><br>
                    <input type="file" id="videoFile" accept="video/*" style="width: 100%; margin-bottom: 10px;"><br>
                </div>

                <button type="submit" class="btn-classic">Publicar Vídeo!</button>
            </form>
            <div id="statusMessage" style="margin-top: 10px; font-weight: bold; font-size: 12px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/config.js" defer></script>
    
    <script>
        let supabaseClient = null;

        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof CONFIG !== 'undefined' && typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session) { window.location.href = "login.html"; return; }
                
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('uploadContainer').style.display = 'block';
            }
        });

        function toggleUploadType(type) {
            document.getElementById('ytInputSection').style.display = (type === 'youtube') ? 'block' : 'none';
            document.getElementById('fileInputSection').style.display = (type === 'file') ? 'block' : 'none';
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('statusMessage');
            status.innerText = "Publicando...";

            const autor = document.getElementById('autor').value;
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('videoDescricao').value;
            const uploadType = document.querySelector('input[name="uploadType"]:checked').value;

            let finalEmbedUrl = "";
            let finalThumbUrl = "";

            if (uploadType === 'youtube') {
                const link = document.getElementById('ytLink').value;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = link.match(regExp);
                const id = (match && match[2].length === 11) ? match[2] : null;

                if(!id) { status.innerText = "Erro: Link do YouTube inválido."; return; }
                
                finalEmbedUrl = `https://www.youtube.com/embed/${id}`;
                finalThumbUrl = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            } else {
                finalEmbedUrl = "local_file"; 
                finalThumbUrl = "https://placehold.co/300x180";
            }

            const novoVideo = { 
                titulo: titulo || "Sem título", 
                autor: autor || "LirpeFelipovi", 
                descricao: descricao || "", 
                visualizacoes: "0", 
                thumb: finalThumbUrl || "", 
                embedUrl: finalEmbedUrl || "" 
            };

            const { error } = await supabaseClient.from('videos').insert([novoVideo]);

            if (error) {
                status.innerText = "Erro ao publicar: " + error.message;
            } else {
                status.innerText = "Publicado com sucesso!";
                setTimeout(() => window.location.href = "index.html", 2000);
            }
        });
    </script>
</body>
</html>
