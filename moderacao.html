<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Painel de Moderação</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .mod-container { max-width: 1000px; margin: 20px auto; padding: 0 10px; box-sizing: border-box; font-family: Arial, sans-serif; }
        .mod-header { background: #FFEBEB; border: 1px solid #CC0000; padding: 15px; margin-bottom: 20px; color: #CC0000; }
        .mod-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .mod-table th, .mod-table td { border: 1px solid #CCCCCC; padding: 8px; text-align: left; }
        .mod-table th { background: #F0F3F8; color: #333; }
        .mod-thumb { width: 80px; height: auto; border: 1px solid #999; }
        .btn-action { padding: 3px 6px; cursor: pointer; font-size: 10px; margin: 2px; border: 1px solid #666; }
        .btn-strike { background: #000; color: #fff; }
        .btn-copy { background: #555; color: #fff; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="lirpe">Lirpe</span><span class="hub">Hub</span>
            </a>
            <span class="slogan">Área Administrativa</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Página Inicial</a> | 
            <a href="moderacao.html" class="active">Moderação</a>
        </nav>
    </header>

    <div class="mod-container">
        <div class="mod-header">
            <h2>🛡️ Central de Moderação do LirpeHub</h2>
            <p>Gerencie denúncias, aplique strikes e controle direitos autorais.</p>
        </div>

        <table class="mod-table">
            <thead>
                <tr>
                    <th>Miniatura</th>
                    <th>Detalhes</th>
                    <th>Denúncia</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaDenuncias">
                <tr><td colspan="4" style="text-align: center;">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    
    <script>
        let supabaseClient = null;

        window.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            await carregarDenuncias();
        });

        async function carregarDenuncias() {
            const tbody = document.getElementById('listaDenuncias');
            let { data: videos } = await supabaseClient
                .from('videos')
                .select('*')
                .eq('denunciado', true);

            if (!videos || videos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Nenhuma denúncia pendente!</td></tr>';
                return;
            }

            tbody.innerHTML = videos.map(v => `
                <tr>
                    <td><img src="${v.thumb}" class="mod-thumb"></td>
                    <td><strong>${v.titulo}</strong><br>Autor: ${v.autor}<br>Email: ${v.email_autor || 'N/A'}</td>
                    <td>${v.motivo_denuncia}</td>
                    <td>
                        <button class="btn-action" onclick="ignorarDenuncia('${v.id}')">Aprovar</button>
                        <button class="btn-action" onclick="deletarVideo('${v.id}')">Excluir</button>
                        <button class="btn-action btn-strike" onclick="aplicarStrike('${v.email_autor}', '${v.id}')">Dar Strike</button>
                        <button class="btn-action btn-copy" onclick="marcarCopyright('${v.id}')">Copyright</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deletarVideo(id) {
            if (!confirm("Excluir permanentemente?")) return;
            await supabaseClient.from('videos').delete().eq('id', id);
            carregarDenuncias();
        }

        async function ignorarDenuncia(id) {
            await supabaseClient.from('videos').update({ denunciado: false }).eq('id', id);
            carregarDenuncias();
        }

        // SISTEMA DE STRIKE
        async function aplicarStrike(email, videoId) {
            if (!email) return alert("Erro: Email do autor não encontrado.");
            
            // Busca strikes atuais
            let { data: user } = await supabaseClient.from('usuarios').select('strikes').eq('email', email).single();
            let total = (user ? user.strikes : 0) + 1;

            await supabaseClient.from('usuarios').update({ strikes: total }).eq('email', email);
            alert("Strike aplicado! Total: " + total);
            await deletarVideo(videoId);
        }

        // SISTEMA DE COPYRIGHT
        async function marcarCopyright(id) {
            const detentor = prompt("Nome do detentor do copyright:");
            if (!detentor) return;
            
            await supabaseClient.from('videos').update({ 
                denunciado: false, 
                copyright_strike: true, 
                detentor_copyright: detentor 
            }).eq('id', id);
            
            alert("Vídeo marcado como Copyright Strike.");
            carregarDenuncias();
        }
    </script>
</body>
</html>
