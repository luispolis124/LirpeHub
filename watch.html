<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Broadcast Yourself</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .watch-container { display: flex; gap: 20px; max-width: 1000px; margin: 15px auto; padding: 0 10px; box-sizing: border-box; }
        .main-video-section { flex: 3; min-width: 0; }
        .sidebar-section { flex: 1; min-width: 260px; }
        .video-player-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #CCCCCC; overflow: hidden; }
        #videoPlayerIframe { width: 100%; height: 100%; border: none; }
        .video-js { width: 100%; height: 100%; }
        .video-details-box { border: 1px solid #CCD2E0; background: #F0F3F8; padding: 10px; margin-top: 10px; font-size: 12px; }
        .rating-box { display: flex; align-items: center; gap: 5px; }
        .star-item { font-size: 16px; color: #CCCCCC; cursor: pointer; transition: color 0.1s; }
        .btn-flag { background: #FCE4D6; border: 1px solid #C65911; color: #C65911; font-weight: bold; padding: 2px 6px; cursor: pointer; }
        @media (max-width: 768px) { .watch-container { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="lirpe">Lirpe</span><span class="hub">Hub</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Página Inicial</a> | 
            <a href="javascript:void(0);" onclick="redirecionarParaCanal()">Canais</a> |
            <a href="enviar.html" style="color: #CC0000; font-weight: bold;">Enviar Vídeo</a>
        </nav>
    </header>

    <div class="container watch-container">
        <main class="main-video-section">
            <div class="video-player-box" id="playerContainer">
                <iframe id="videoPlayerIframe" src="" style="display:none;" allowfullscreen></iframe>
                <video id="lirpe-player" class="video-js vjs-default-skin vjs-big-play-centered" controls style="display:none;"></video>
            </div>

            <div class="video-details-box">
                <h1 id="videoTitle">Carregando...</h1>
                <p id="videoDesc"></p>
                <div class="video-meta-row">
                    <div>Adicionado por: <a href="#" id="videoAuthor">...</a></div>
                    <div><span id="videoViews">0</span> visualizaçőes</div>
                </div>
                <div class="rating-row">
                    <div class="rating-box">
                        <span>Avaliaçăo:</span>
                        <div id="starsContainer" class="stars-container">
                            <span class="star-item" data-value="5"></span>
                            <span class="star-item" data-value="4"></span>
                            <span class="star-item" data-value="3"></span>
                            <span class="star-item" data-value="2"></span>
                            <span class="star-item" data-value="1"></span>
                        </div>
                        <span id="ratingStatus">(Calculando...)</span>
                    </div>
                    <button class="btn-flag" id="flagBtn"> Denunciar</button>
                </div>
            </div>

            <div class="comments-section">
                <h3>Comentários</h3>
                <textarea id="commentInput" placeholder="Escreva um comentário..."></textarea>
                <button id="postCommentBtn">Postar Comentário</button>
                <div id="commentsList"></div>
            </div>
        </main>
        <aside class="sidebar-section">
            <h2>Relacionados</h2>
            <div id="relatedVideosContainer"></div>
        </aside>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        let supabaseClient, idVideoAtual, videoData, player;

        window.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            await iniciarPagina();
            
            document.getElementById('postCommentBtn').addEventListener('click', postarComentario);
            document.querySelectorAll('.star-item').forEach(s => s.addEventListener('click', (e) => salvarAvaliacao(e.target.dataset.value)));
        });

        async function iniciarPagina() {
            const vId = new URLSearchParams(window.location.search).get('v');
            if (!vId) return;

            const { data: video } = await supabaseClient.from('videos').select('*').eq('id', vId).single();
            if (!video) return;
            videoData = video;

            // --- AQUI É ONDE O PLAYER É CONFIGURADO (Teste com Oceans) ---
            const url = "https://vjs.zencdn.net/v/oceans.mp4"; 
            
            const vjs = document.getElementById('lirpe-player');
            vjs.style.display = 'block'; // Mostra o player
            
            if (!player) {
                player = videojs('lirpe-player');
            }
            
            player.src({ src: url, type: 'video/mp4' });
            // -----------------------------------------------------------

            document.getElementById('videoTitle').innerText = video.titulo;
            document.getElementById('videoDesc').innerText = video.descricao;
            document.getElementById('videoAuthor').innerText = video.autor;
            document.getElementById('videoAuthor').href = `canais.html?user=${encodeURIComponent(video.autor)}`;
            document.getElementById('videoViews').innerText = video.visualizacoes;
            
            atualizarEstrelas(video);
            carregarComentarios(vId);
        }

        function atualizarEstrelas(v) {
            const media = Math.round((v.soma_rating || 0) / (v.total_rating || 1));
            document.querySelectorAll('.star-item').forEach(s => {
                s.style.color = s.dataset.value <= media ? '#FFCC00' : '#CCCCCC';
            });
        }

        async function salvarAvaliacao(val) {
            const { error } = await supabaseClient.from('videos').update({ 
                soma_rating: (videoData.soma_rating || 0) + parseInt(val),
                total_rating: (videoData.total_rating || 0) + 1 
            }).eq('id', idVideoAtual);
            if (!error) location.reload();
        }

        async function postarComentario() {
            const texto = document.getElementById('commentInput').value;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return alert("Faça login!");
            await supabaseClient.from('comentarios').insert([{ video_id: idVideoAtual, autor: session.user.email, texto }]);
            location.reload();
        }

        async function carregarComentarios(id) {
            const { data } = await supabaseClient.from('comentarios').select('*').eq('video_id', id);
            document.getElementById('commentsList').innerHTML = data?.map(c => `<p><b>${c.autor}:</b> ${c.texto}</p>`).join('') || '';
        }

        function redirecionarParaCanal() { location.href = "canais.html"; }
    </script>
</body>
</html>
