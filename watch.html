<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Broadcast Yourself</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .watch-container { display: flex; gap: 20px; max-width: 1000px; margin: 15px auto; padding: 0 10px; box-sizing: border-box; }
        .main-video-section { flex: 3; min-width: 0; }
        .sidebar-section { flex: 1; min-width: 260px; }
        /* Box do player agora adaptada para o Video.js */
        .video-player-box { position: relative; width: 100%; background: #000; border: 1px solid #CCCCCC; }
        .video-js { width: 100%; height: auto; aspect-ratio: 16/9; }
        .video-details-box { border: 1px solid #CCD2E0; background: #F0F3F8; padding: 10px; margin-top: 10px; font-size: 12px; }
        .video-details-box h1 { font-size: 16px; margin: 0 0 10px 0; color: #333; }
        .video-meta-row { display: flex; justify-content: space-between; border-bottom: 1px solid #CCD2E0; padding-bottom: 8px; margin-bottom: 8px; }
        .rating-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .rating-box { display: flex; align-items: center; gap: 5px; }
        .star-item { font-size: 16px; color: #CCCCCC; cursor: pointer; }
        .btn-flag { background: #FCE4D6; border: 1px solid #C65911; color: #C65911; font-size: 10px; font-weight: bold; padding: 2px 6px; cursor: pointer; }
        @media (max-width: 768px) { .watch-container { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="lirpe">Lirpe</span><span class="hub">Hub</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Página Inicial</a> | 
            <a href="javascript:void(0);" onclick="redirecionarParaCanal()">Canais</a> |
            <a href="enviar.html" style="color: #CC0000; font-weight: bold;">Enviar Vídeo</a>
        </nav>
    </header>

    <div class="container watch-container">
        <main class="main-video-section">
            <div class="video-player-box">
                <video id="lirpe-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                    <source src="" type="application/x-mpegURL">
                </video>
            </div>
            
            <div class="video-details-box">
                <h1 id="videoTitle">Carregando...</h1>
                <p id="videoDesc"></p>
                <div class="video-meta-row">
                    <div>Adicionado por: <a href="#" id="videoAuthor">...</a></div>
                    <div><span id="videoViews">0</span> visualizaçőes</div>
                </div>
                <button class="btn-flag" id="flagBtn"> Denunciar</button>
            </div>
            
            <div class="comments-section">
                <h3>Comentários</h3>
                <textarea id="commentInput" style="width: 100%; height: 50px;"></textarea>
                <button id="postCommentBtn">Postar</button>
                <div id="commentsList"></div>
            </div>
        </main>
        <aside class="sidebar-section">
            <h2>Vídeos Relacionados</h2>
            <div id="relatedVideosContainer"></div>
        </aside>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        let supabaseClient = null;
        let player = null;

        window.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            player = videojs('lirpe-player');
            await iniciarPagina();
        });

        async function iniciarPagina() {
            const vId = new URLSearchParams(window.location.search).get('v');
            if (!vId) return;

            const { data: video } = await supabaseClient.from('videos').select('*').eq('id', vId).single();
            if (!video) return;

            // Carrega a URL do Mux (ex: https://stream.mux.com/SEU_ID.m3u8)
            player.src({
                src: video.mux_url, 
                type: 'application/x-mpegURL'
            });

            document.getElementById('videoTitle').innerText = video.titulo;
            document.getElementById('videoDesc').innerText = video.descricao;
            document.getElementById('videoAuthor').innerText = video.autor;
            document.getElementById('videoAuthor').href = `canais.html?user=${encodeURIComponent(video.autor)}`;
            document.getElementById('videoViews').innerText = video.visualizacoes;
            
            carregarComentarios(vId);
        }

        async function carregarComentarios(vId) {
            const { data } = await supabaseClient.from('comentarios').select('*').eq('video_id', vId);
            document.getElementById('commentsList').innerHTML = data?.map(c => `<p><b>${c.autor}:</b> ${c.texto}</p>`).join('') || '';
        }

        function redirecionarParaCanal() {
            window.location.href = "canais.html"; // Ajuste conforme sua necessidade
        }
    </script>
</body>
</html>
