<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LirpeHub - Assistindo</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .watch-container { display: flex; gap: 20px; max-width: 1000px; margin: 15px auto; padding: 0 10px; }
        .main-video-section { flex: 3; }
        .video-player-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-player-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .stars-container { display: inline-flex; flex-direction: row-reverse; cursor: pointer; }
        .star-item { font-size: 16px; color: #CCCCCC; }
        .stars-container.rated { pointer-events: none; opacity: 0.8; }
        .btn-flag { background: #FCE4D6; border: 1px solid #C65911; color: #C65911; cursor: pointer; }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">LirpeHub</a>
    </header>

    <div class="watch-container">
        <main class="main-video-section">
            <div class="video-player-box" id="videoEmbed"></div>
            
            <div class="video-details-box">
                <h1 id="videoTitulo">Carregando...</h1>
                <div class="video-meta">
                    <p>Adicionado por: <a href="#" id="videoAuthor">...</a></p>
                    <p><span id="videoViews">0</span> visualizaçőes</p>
                </div>
                <p id="videoDescricao"></p>

                <div class="rating-row">
                    <div class="stars-container" id="starsContainer">
                        <span class="star-item" data-value="5"></span>
                        <span class="star-item" data-value="4"></span>
                        <span class="star-item" data-value="3"></span>
                        <span class="star-item" data-value="2"></span>
                        <span class="star-item" data-value="1"></span>
                    </div>
                    <span id="ratingStatus">(...)</span>
                    <button class="btn-flag" id="flagBtn"> Denunciar</button>
                </div>
            </div>

            <div class="comments-section">
                <h3>Comentários</h3>
                <textarea id="commentInput" placeholder="Comente algo..."></textarea>
                <button id="postCommentBtn">Postar</button>
                <div id="commentsList"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/watch.js"></script>
</body>
</html>
